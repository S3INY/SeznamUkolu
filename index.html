<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Moje Úkoly - IT Dashboard</title>
    <style>
        /* Moderní Apple-ish styl optimalizovaný pro dotyk */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #F5F5F7; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 450px; /* Širší pro lepší čitelnost */
        }

        h1 { font-size: 26px; font-weight: 700; margin-bottom: 25px; text-align: center; color: #1D1D1F; }

        /* Inputy musí být velké pro prsty */
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            border: 1px solid #D2D2D7; 
            border-radius: 14px; 
            font-size: 16px; /* Důležité: 16px zabrání iOS zoomování */
            background: #FBFBFD;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: #007AFF; background: white; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        /* Hlavní tlačítka */
        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 14px; 
            border: none; 
            background: #007AFF; 
            color: white; 
            font-weight: 600; 
            font-size: 17px;
            cursor: pointer; 
            margin-top: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .hidden { display: none !important; }

        /* Seznam úkolů */
        ul { list-style: none; padding: 0; margin-top: 25px; }

        li { 
            background: #FBFBFD; 
            border: 1px solid #F2F2F7; 
            margin-bottom: 12px; 
            padding: 16px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        li span { flex: 1; font-size: 16px; color: #1D1D1F; padding-right: 15px; line-height: 1.4; }

        /* Tlačítko smazat (X) - teď je mnohem větší */
        .delete-btn { 
            background: #F2F2F7; 
            color: #FF3B30; 
            width: 44px; /* Apple standard pro touch target */
            height: 44px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
        }

        .logout-btn { 
            background: transparent; 
            color: #8E8E93; 
            margin-top: 20px; 
            font-size: 14px; 
            text-decoration: underline;
        }

        /* Responzivní ladění pro extra malé mobily */
        @media (max-width: 350px) {
            .container { padding: 15px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h1 id="auth-title">Přihlášení</h1>
        <input type="text" id="username" placeholder="Uživatelské jméno" autocomplete="username">
        <input type="password" id="password" placeholder="Heslo" autocomplete="current-password">
        <button onclick="provedAuth()" id="auth-btn">Přihlásit se</button>
        <p style="text-align:center; font-size: 14px; color: #007AFF; cursor: pointer; margin-top: 25px;" onclick="prepniRezim()">
            Nemáš účet? Zaregistruj se.
        </p>
    </div>

    <div id="task-section" class="hidden">
        <h1>Moje úkoly</h1>
        <div style="display:flex; gap:10px; align-items: stretch;">
            <input type="text" id="novyUkol" placeholder="Nový úkol..." style="margin:0;">
            <button style="width:60px; margin:0; font-size: 24px;" onclick="pridatUkol()">+</button>
        </div>
        <ul id="seznam"></ul>
        <button class="logout-btn" onclick="odhlasit()">Odhlásit se</button>
    </div>
</div>

<script>
    const API = 'https://seznamukolu.onrender.com/api';
    let userId = null;
    let jeRezimRegistrace = false;

    // --- AUTOMATICKÉ PŘIHLÁŠENÍ ---
    const ulozenaData = localStorage.getItem('mojeSession');
    if (ulozenaData) {
        const session = JSON.parse(ulozenaData);
        if (new Date().getTime() < session.expirace) {
            userId = session.id;
            zobrazDashboard();
        } else {
            localStorage.removeItem('mojeSession');
        }
    }

    function prepniRezim() {
        jeRezimRegistrace = !jeRezimRegistrace;
        document.getElementById('auth-title').innerText = jeRezimRegistrace ? 'Registrace' : 'Přihlášení';
        document.getElementById('auth-btn').innerText = jeRezimRegistrace ? 'Vytvořit účet' : 'Přihlásit se';
        const odkaz = document.querySelector('#auth-section p');
        odkaz.innerText = jeRezimRegistrace ? 'Už máš účet? Přihlas se.' : 'Nemáš účet? Zaregistruj se.';
    }

    function provedAuth() {
        const jmeno = document.getElementById('username').value;
        const heslo = document.getElementById('password').value;
        const cesta = jeRezimRegistrace ? '/registrace' : '/login';

        if (!jmeno || !heslo) return alert("Vyplň jméno a heslo.");

        fetch(API + cesta, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Jmeno: jmeno, Heslo: heslo })
        })
        .then(res => {
            if (!res.ok) throw new Error("Špatné jméno nebo heslo.");
            return jeRezimRegistrace ? null : res.json();
        })
        .then(id => {
            if (jeRezimRegistrace) {
                alert("Registrace OK! Teď se přihlas.");
                prepniRezim();
            } else if (id) {
                userId = id;
                const expirace = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
                localStorage.setItem('mojeSession', JSON.stringify({ id: id, expirace: expirace }));
                zobrazDashboard();
            }
        })
        .catch(err => alert(err.message));
    }

    function zobrazDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('task-section').classList.remove('hidden');
        nactiUkoly();
    }

    function nactiUkoly() {
        fetch(`${API}/ukoly/${userId}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('seznam');
                list.innerHTML = '';
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.text}</span>
                        <button class="delete-btn" onclick="smazatUkol(${item.id})">✕</button>
                    `;
                    list.appendChild(li);
                });
            });
    }

    function pridatUkol() {
        const input = document.getElementById('novyUkol');
        if (!input.value.trim()) return;

        fetch(`${API}/ukoly`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Text: input.value, UserId: userId })
        }).then(() => {
            input.value = '';
            nactiUkoly();
        });
    }

    async function smazatUkol(id) {
        if (!confirm("Opravdu smazat?")) return;
        try {
            const response = await fetch(`${API}/ukoly/${id}`, { method: 'DELETE' });
            if (response.ok) nactiUkoly();
        } catch (err) {
            console.error(err);
        }
    }

    function odhlasit() {
        localStorage.removeItem('mojeSession');
        location.reload();
    }
</script>

</body>
</html>
