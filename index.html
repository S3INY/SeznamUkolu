<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Úkoly - IT Dashboard</title>
    <style>
        /* Moderní Apple-ish styl */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #F5F5F7; 
            display: flex; 
            justify-content: center; 
            padding: 50px 20px;
            margin: 0;
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            width: 100%;
            max-width: 400px; /* Ideální šířka pro desktop i mobil */
            box-sizing: border-box;
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; text-align: center; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #D2D2D7; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; /* Zabrání zoomování na iOS */
            outline: none;
            transition: border 0.2s;
        }

        input:focus { border-color: #007AFF; }

        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: #007AFF; 
            color: white; 
            font-weight: 600; 
            font-size: 16px;
            cursor: pointer; 
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        .hidden { display: none !important; }

        ul { list-style: none; padding: 0; margin-top: 20px; }

        li { 
            background: #FBFBFD; 
            border: 1px solid #F2F2F7; 
            margin: 8px 0; 
            padding: 12px 16px; 
            border-radius: 14px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        li span { flex: 1; word-break: break-word; font-size: 15px; color: #1D1D1F; }

        .delete-btn { 
            background: none; 
            color: #FF3B30; 
            width: auto; 
            padding: 5px 10px; 
            font-size: 18px; 
            font-weight: bold;
        }

        .logout-btn { 
            background: #E8E8ED; 
            color: #1D1D1F; 
            margin-top: 30px; 
            font-size: 14px; 
            padding: 10px;
        }

        /* Responzivní úpravy pro malé mobily */
        @media (max-width: 400px) {
            .container { padding: 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h1 id="auth-title">Přihlášení</h1>
        <input type="text" id="username" placeholder="Uživatelské jméno" autocomplete="username">
        <input type="password" id="password" placeholder="Heslo" autocomplete="current-password">
        <button onclick="provedAuth()" id="auth-btn">Přihlásit se</button>
        <p style="text-align:center; font-size: 14px; color: #007AFF; cursor: pointer; margin-top: 20px;" onclick="prepniRezim()">
            Nemáš účet? Zaregistruj se.
        </p>
    </div>

    <div id="task-section" class="hidden">
        <h1>Moje úkoly</h1>
        <div style="display:flex; gap:8px;">
            <input type="text" id="novyUkol" placeholder="Co je potřeba udělat?">
            <button style="width:50px; flex-shrink:0;" onclick="pridatUkol()">+</button>
        </div>
        <ul id="seznam"></ul>
        <button class="logout-btn" onclick="odhlasit()">Odhlásit se</button>
    </div>
</div>

<script>
    const API = 'https://seznamukolu.onrender.com/api';
    let userId = null;
    let jeRezimRegistrace = false;

    // --- AUTOMATICKÉ PŘIHLÁŠENÍ ---
    const ulozenaData = localStorage.getItem('mojeSession');
    if (ulozenaData) {
        const session = JSON.parse(ulozenaData);
        if (new Date().getTime() < session.expirace) {
            userId = session.id;
            zobrazDashboard();
        } else {
            localStorage.removeItem('mojeSession');
        }
    }

    function prepniRezim() {
        jeRezimRegistrace = !jeRezimRegistrace;
        document.getElementById('auth-title').innerText = jeRezimRegistrace ? 'Registrace' : 'Přihlášení';
        document.getElementById('auth-btn').innerText = jeRezimRegistrace ? 'Vytvořit účet' : 'Přihlásit se';
        const odkaz = document.querySelector('#auth-section p');
        odkaz.innerText = jeRezimRegistrace ? 'Už máš účet? Přihlas se.' : 'Nemáš účet? Zaregistruj se.';
    }

    function provedAuth() {
        const jmeno = document.getElementById('username').value;
        const heslo = document.getElementById('password').value;
        const cesta = jeRezimRegistrace ? '/registrace' : '/login';

        if (!jmeno || !heslo) return alert("Vyplň jméno a heslo.");

        fetch(API + cesta, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Jmeno: jmeno, Heslo: heslo })
        })
        .then(res => {
            if (!res.ok) throw new Error("Špatné jméno nebo heslo.");
            return jeRezimRegistrace ? null : res.json();
        })
        .then(id => {
            if (jeRezimRegistrace) {
                alert("Účet vytvořen! Teď se můžeš přihlásit.");
                prepniRezim();
            } else if (id) {
                userId = id;
                const expirace = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
                localStorage.setItem('mojeSession', JSON.stringify({ id: id, expirace: expirace }));
                zobrazDashboard();
            }
        })
        .catch(err => alert(err.message));
    }

    function zobrazDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('task-section').classList.remove('hidden');
        nactiUkoly();
    }

    function nactiUkoly() {
        fetch(`${API}/ukoly/${userId}`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('seznam');
                list.innerHTML = '';
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${item.text}</span>
                        <button class="delete-btn" onclick="smazatUkol(${item.id})">✕</button>
                    `;
                    list.appendChild(li);
                });
            });
    }

    function pridatUkol() {
        const input = document.getElementById('novyUkol');
        if (!input.value.trim()) return;

        fetch(`${API}/ukoly`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Text: input.value, UserId: userId })
        }).then(() => {
            input.value = '';
            nactiUkoly();
        });
    }

    async function smazatUkol(id) {
        try {
            const response = await fetch(`${API}/ukoly/${id}`, { method: 'DELETE' });
            if (response.ok) {
                nactiUkoly();
            } else {
                alert('Smazání se nepodařilo.');
            }
        } catch (err) {
            console.error("Chyba při mazání:", err);
        }
    }

    function odhlasit() {
        localStorage.removeItem('mojeSession');
        location.reload();
    }
</script>

</body>
</html>
